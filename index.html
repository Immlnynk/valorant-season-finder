const FIRST = PERIODS[0].start;
const MONTHS_EN = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// ===== 多言語辞書 =====
const I18N = {
  ja: {
    htmlLang: "ja",
    title: "VALORANT 今のシーズン・Act 判定ツール｜現在のAct残り日数も表示",
    nowLabel: "現在のシーズン",
    heroH1: "VALORANT は今どのシーズン / Act？",
    card1H2: "日付からシーズンを判定",

    card1P: "Pick a date to see which Season / Act it fell in",

    thAct: "Act",

    afterRange: d => `${d} is beyond the data range.<br>Please add new Acts once they are announced.`,
    periodLabel: "Period",
    elapsedLabel: "Progress",
    progressLabel: pct => `Act progress ${pct}%`,
    elapsedDays: (total, elapsed, remaining) => `Day ${elapsed} of ${total} (${remaining} days left)`,
    elapsedDaysOpen: elapsed => `Day ${elapsed} since start`,
    openNote: "* Days left and progress are unavailable until the end date is announced.",
    heroPeriod: (s, e) => `Period: ${s} – ${e}`,
    heroRemaining: (remaining, pct) => `<b>${remaining} days</b> left in this Act (progress ${pct}%)`,
    heroOpen: elapsed => `In progress (<b>day ${elapsed}</b>). Days left can't be calculated until the end date is announced.`,
    heroOut: "Today is outside the recorded data range. Please add new Acts once they are announced.",
    foot: 'Note: Since 2025, Riot moved from "Episode / Act" to "Season (yearly) / Act". ' +

let lang = localStorage.getItem("vsf-lang") || (navigator.language && navigator.language.startsWith("ja") ? "ja" : "en");

const resultEl = document.getElementById("result");
const dateEl = document.getElementById("date");

function fmt(d) {
  const [y, m, day] = d.split("-").map(Number);
  return lang === "ja" ? `${y}年${m}月${day}日` : `${MONTHS_EN[m - 1]} ${day}, ${y}`;
}
function fmtShort(d) {
  const [y, m, day] = d.split("-").map(Number);
  return lang === "ja" ? `${y}/${m}/${day}` : `${MONTHS_EN[m - 1]} ${day}, ${y}`;
}
function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}
// value が属する Act を返す（end が null の Act は開始日以降すべてにマッチ）
function findPeriod(value) {
  return PERIODS.find(p => value >= p.start && (p.end === null || value < p.end));
}

function show(value) {
  const t = I18N[lang];
  if (!value) {
    resultEl.innerHTML = `<div class="empty">${t.emptyDefault}</div>`;
    return;
  }
  if (value < FIRST) {
    resultEl.innerHTML = `<div class="empty">${t.beforeRelease(fmt(value))}</div>`;
    return;
  }
  const p = findPeriod(value);
  if (!p) {
    resultEl.innerHTML = `<div class="empty">${t.afterRange(fmt(value))}</div>`;
    return;
  }

  const elapsed = daysBetween(p.start, value) + 1;

  // 終了日が未発表の Act：残り日数・進行度バーは出さない
  if (p.end === null) {
    resultEl.innerHTML = `
      <div class="season">${p.era}</div>
      <div class="act">${p.act}</div>
      <div class="meta">
        <div><b>${t.periodLabel}</b>　${fmt(p.start)} 〜 <span class="tba">${t.tba}</span></div>
        <div><b>${t.elapsedLabel}</b>　${t.elapsedDaysOpen(elapsed)}</div>
        <div class="note">${t.openNote}</div>
      </div>`;
    return;
  }

  const total = daysBetween(p.start, p.end);
  const pct = Math.min(100, Math.round(elapsed / total * 100));
  const remaining = total - elapsed;

  resultEl.innerHTML = `
    <div class="season">${p.era}</div>
    <div class="act">${p.act}</div>
    <div class="meta">
      <div><b>${t.periodLabel}</b>　${fmt(p.start)} 〜 ${fmt(p.end)}</div>
      <div><b>${t.elapsedLabel}</b>　${t.elapsedDays(total, elapsed, remaining)}</div>
    </div>
    <div class="bar-wrap">
      <div class="bar"><span style="width:${pct}%"></span></div>
      <div class="bar-label">${t.progressLabel(pct)}</div>
    </div>`;
}

  const t = I18N[lang];
  const today = todayStr();
  const el = document.getElementById("hero-content");
  const p = (today >= FIRST) ? findPeriod(today) : null;

  if (!p) {
    el.innerHTML = `<div class="now-meta" style="margin-top:14px;">${t.heroOut}</div>`;
    return;
  }
  const elapsed = daysBetween(p.start, today) + 1;

  if (p.end === null) {
    el.innerHTML = `
      <div class="now-season">${p.era}</div>
      <div class="now-act">${p.act}</div>
      <div class="now-meta">
        ${t.heroPeriod(fmtShort(p.start), t.tba)}<br>
        ${t.heroOpen(elapsed)}
      </div>`;
    return;
  }

  const total = daysBetween(p.start, p.end);
  const pct = Math.min(100, Math.round(elapsed / total * 100));
  const remaining = total - elapsed;

  el.innerHTML = `
    <div class="now-season">${p.era}</div>
    <div class="now-act">${p.act}</div>
    <div class="now-meta">
      ${t.heroPeriod(fmtShort(p.start), fmtShort(p.end))}<br>
      ${t.heroRemaining(remaining, pct)}
    </div>
    <div class="now-bar"><span style="width:${pct}%"></span></div>`;
}

// ===== 全Act一覧テーブルを生成 =====
function renderTable() {
  const t = I18N[lang];
  const today = todayStr();
  const tbody = document.getElementById("period-table");
  tbody.innerHTML = PERIODS.map(p => {
    const current = (today >= p.start && (p.end === null || today < p.end));
    const endCell = p.end === null ? `<span class="tba">${t.tba}</span>` : fmtShort(p.end);
    return `<tr class="${current ? "is-current" : ""}">
      <td>${p.era}</td>
      <td class="act-col">${p.act}</td>
      <td>${fmtShort(p.start)}</td>
      <td>${endCell}</td>
    </tr>`;
  }).join("");
}

// ===== 言語を適用 =====
function applyLang() {
  const t = I18N[lang];
  document.documentElement.lang = t.htmlLang;
  document.title = t.title;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t[el.dataset.i18n];
  });
  document.querySelectorAll("[data-i18n-html]").forEach(el => {
    el.innerHTML = t[el.dataset.i18nHtml];
  });
  document.querySelectorAll(".lang-switch button").forEach(b => {
    b.classList.toggle("active", b.dataset.lang === lang);
  });
  renderHero();
  renderTable();
  show(dateEl.value);
}

function setLang(l) {
  lang = l;
  localStorage.setItem("vsf-lang", l);
  applyLang();
}

document.querySelectorAll(".lang-switch button").forEach(b => {
  b.addEventListener("click", () => setLang(b.dataset.lang));
});
dateEl.addEventListener("input", e => show(e.target.value));

// 日付入力の初期値：今日（収録範囲内なら）
const today = todayStr();
if (today >= FIRST && findPeriod(today)) {
  dateEl.value = today;
}

// 初期化（言語適用の中で hero / table / result をまとめて描画）
applyLang();
</script>
</body>
</html>
